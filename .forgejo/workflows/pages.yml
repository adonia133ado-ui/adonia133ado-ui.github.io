name: Deploy to Codeberg Pages
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy
        run: |
          mkdir -p /tmp/pages
          cp -r ./* /tmp/pages/ 2>/dev/null || true
          cp -r ./.domains /tmp/pages/ 2>/dev/null || true
